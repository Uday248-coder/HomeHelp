name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [services/api, apps/website, apps/admin]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace=${{ matrix.workspace }}
      - run: npm run build --workspace=${{ matrix.workspace }}
